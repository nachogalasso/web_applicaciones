<body>

    <nav>
        <h1>Foul Enforcement Visualizer</h1>
    </nav>

    <!-- ADD ICONS START -->
    <section class="toolbar">
        <button onclick="createMaker ('x')">Add X</button>
        <button onclick="createMaker ('flag')">Add Flag</button>
        <button onclick="createMaker ('ball')">Add Ball</button>

        <!-- Input to add LOS-->
        <input type="number" id="losInput" placeholder="Enter LOS (Yards)" min="0" max="100">
        <button onclick="setLOS()">Set LOS</button>
        <button onclick="clearMarkers()">Clear Markers</button> 
    </section>
    <!-- ADD ICONS END -->

    <!-- FIELD START -->
     
    <section class="field_container">
        <div class="field" id="field">
            <div class="los_line" id="losLine"></div>
        </div>
        <!-- Field content goes here -->
